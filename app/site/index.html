<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAELINUS</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Helvetica,Arial;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.center{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;

}

.logo{

font-size:60px;
letter-spacing:8px;
font-weight:300;

}

.subtitle{

margin-top:20px;
font-size:18px;
opacity:0.7;

}

.enter{

margin-top:40px;
padding:15px 40px;
border:1px solid white;
display:inline-block;
cursor:pointer;
transition:0.3s;

}

.enter:hover{

background:white;
color:black;

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="center">

<div class="logo">
CAELINUS
</div>

<div class="subtitle">
ENTER THE CONSCIOUS FASHION UNIVERSE
</div>

<div class="enter" onclick="enterUniverse()">
ENTER
</div>

</div>

<script>

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

});

}

function animate(){

draw();
requestAnimationFrame(animate);

}

animate();

function enterUniverse(){

window.location.href="universe.html"

}

</script>

</body>

</html>
