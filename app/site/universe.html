<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAELINUS Universe</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 50% 16%, rgba(196,166,255,0.18), transparent 18%),
        radial-gradient(circle at 18% 72%, rgba(90,130,255,0.10), transparent 22%),
        radial-gradient(circle at 82% 68%, rgba(220,140,255,0.11), transparent 20%),
        linear-gradient(180deg, #04050b 0%, #060914 45%, #03040a 100%);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 20%, rgba(210,180,255,0.16), transparent 18%),
        radial-gradient(circle at 30% 60%, rgba(116,148,255,0.10), transparent 24%),
        radial-gradient(circle at 74% 58%, rgba(214,150,255,0.11), transparent 22%);
      filter: blur(14px);
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(circle, transparent 45%, rgba(0,0,0,0.52) 100%);
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      transition: opacity .6s ease, transform .8s ease, filter .8s ease;
    }

    .content.hide {
      opacity: 0;
      transform: scale(1.04);
      filter: blur(10px);
    }

    .portal-wrap {
      position: relative;
      width: 340px;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      cursor: pointer;
    }

    .portal-glow {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background:
        radial-gradient(circle,
          rgba(255,255,255,0.35) 0%,
          rgba(200,160,255,0.28) 18%,
          rgba(150,120,255,0.18) 36%,
          rgba(100,90,255,0.12) 52%,
          transparent 75%);
      filter: blur(20px);
      animation: pulseGlow 6s ease-in-out infinite;
    }

    .portal-rings,
    .portal-rings-2 {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(220,240,255,0.22);
      box-shadow:
        0 0 30px rgba(180,220,255,0.12),
        inset 0 0 10px rgba(255,255,255,0.03);
    }

    .portal-rings {
      width: 226px;
      height: 226px;
      animation: ringSpin 26s linear infinite;
    }

    .portal-rings-2 {
      width: 248px;
      height: 248px;
      border-color: rgba(194,222,255,0.14);
      animation: ringSpinReverse 34s linear infinite;
    }

    .portal-core {
      position: relative;
      width: 176px;
      height: 176px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 42%,
          rgba(110,145,210,0.82) 0%,
          rgba(55,72,116,0.96) 34%,
          rgba(14,20,34,1) 72%,
          #060812 100%);
      box-shadow:
        inset 0 0 30px rgba(255,255,255,0.04),
        inset 0 0 90px rgba(120,170,255,0.08),
        0 0 28px rgba(255,255,255,0.10),
        0 0 80px rgba(140,185,255,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform .35s ease;
    }

    .portal-wrap:hover .portal-core {
      transform: scale(1.03);
    }

    .portal-core::before {
      content: "";
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background:
        conic-gradient(
          from 0deg,
          rgba(255,255,255,0.00),
          rgba(205,230,255,0.22),
          rgba(255,255,255,0.00),
          rgba(160,180,255,0.14),
          rgba(255,255,255,0.00)
        );
      filter: blur(10px);
      opacity: 0.75;
      animation: ringSpin 16s linear infinite;
    }

    .infinity {
      position: relative;
      z-index: 2;
      font-size: 78px;
      line-height: 1;
      color: #f7fbff;
      text-shadow:
        0 0 14px rgba(255,255,255,0.45),
        0 0 36px rgba(170,215,255,0.16);
      animation: infinityPulse 4.8s ease-in-out infinite;
    }

    .title {
      margin: 0;
      font-size: 70px;
      font-weight: 500;
      letter-spacing: 11px;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(255,255,255,0.12),
        0 0 26px rgba(190,220,255,0.07);
    }

    .subtitle {
      margin-top: 14px;
      font-size: 16px;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.3px;
      line-height: 1.7;
      max-width: 720px;
    }

    .cards {
      margin-top: 42px;
      width: min(1120px, 92vw);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .card {
      min-height: 168px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 30px rgba(130,180,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all .30s ease;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.015);
      border-color: rgba(255,255,255,0.34);
      box-shadow:
        0 10px 40px rgba(190,220,255,0.10),
        0 0 60px rgba(120,170,255,0.08);
    }

    .icon {
      width: 64px;
      height: 64px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .label {
      font-size: 16px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.96);
    }

    .circle-icon {
      border: 3px solid rgba(235,245,255,0.98);
      border-radius: 50%;
    }

    .triangle-icon {
      width: 0;
      height: 0;
      border-left: 32px solid transparent;
      border-right: 32px solid transparent;
      border-bottom: 56px solid rgba(235,245,255,0.96);
      filter: drop-shadow(0 0 8px rgba(180,220,255,0.10));
    }

    .hex-grid {
      width: 62px;
      height: 62px;
      position: relative;
    }

    .hex-grid span {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(235,245,255,0.95);
      border-radius: 6px;
      transform: rotate(45deg);
    }

    .hex-grid span:nth-child(1) { left: 22px; top: 0px; }
    .hex-grid span:nth-child(2) { left: 8px; top: 18px; }
    .hex-grid span:nth-child(3) { left: 36px; top: 18px; }
    .hex-grid span:nth-child(4) { left: 22px; top: 36px; }

    .infinity-icon {
      font-size: 54px;
      line-height: 1;
      color: rgba(245,250,255,0.98);
    }

    .micro {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      transition: opacity .4s ease;
    }

    /* TRANSITION OVERLAY */
    .transition {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity .5s ease;
      background:
        radial-gradient(circle at center, rgba(30,40,70,0.20), rgba(0,0,0,0.75) 50%, #000 100%);
    }

    .transition.active {
      opacity: 1;
      pointer-events: auto;
    }

    .blackhole {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%) scale(0.4);
      border-radius: 50%;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,1) 28%,
          rgba(20,24,40,1) 54%,
          rgba(130,170,255,0.18) 76%,
          rgba(210,150,255,0.14) 88%,
          transparent 100%);
      box-shadow:
        0 0 30px rgba(150,170,255,0.14),
        0 0 80px rgba(180,120,255,0.10);
      opacity: 0;
    }

    .transition.active .blackhole {
      animation: blackholeGrow 1.7s ease forwards;
    }

    .ai-title {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 44px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #fff;
      opacity: 0;
      text-shadow:
        0 0 12px rgba(255,255,255,0.18),
        0 0 30px rgba(170,220,255,0.12);
      white-space: nowrap;
    }

    .transition.active .ai-title {
      animation: aiReveal 1.2s ease forwards;
      animation-delay: .55s;
    }

    @keyframes pulseGlow {
      0%,100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes ringSpinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes infinityPulse {
      0%,100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    @keyframes blackholeGrow {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
        filter: blur(10px);
      }
      35% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
        filter: blur(1px);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(8.5);
        filter: blur(0);
      }
    }

    @keyframes aiReveal {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(24px);
        letter-spacing: 14px;
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        letter-spacing: 8px;
      }
    }

    @media (max-width: 1024px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
        width: min(760px, 92vw);
      }

      .title {
        font-size: 52px;
        letter-spacing: 8px;
      }

      .portal-wrap {
        width: 280px;
        height: 280px;
      }

      .portal-core {
        width: 162px;
        height: 162px;
      }

      .ai-title {
        font-size: 32px;
      }
    }

    @media (max-width: 640px) {
      .cards {
        grid-template-columns: 1fr;
        width: min(420px, 90vw);
      }

      .title {
        font-size: 40px;
        letter-spacing: 5px;
      }

      .subtitle {
        font-size: 13px;
      }

      .ai-title {
        font-size: 24px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="nebula"></div>
  <div class="vignette"></div>

  <div class="content" id="content">
    <div class="portal-wrap" onclick="openAITransition()">
      <div class="portal-glow"></div>
      <div class="portal-rings-2"></div>
      <div class="portal-rings"></div>
      <div class="portal-core">
        <div class="infinity">∞</div>
      </div>
    </div>

    <h1 class="title">CAELINUS</h1>

    <div class="subtitle">
      Enter the Conscious Fashion Universe
    </div>

    <div class="cards">
      <div class="card cosmos" onclick="goTo('cosmos.html')">
        <div class="icon circle-icon"></div>
        <div class="label">COSMOS</div>
      </div>

      <div class="card archive" onclick="goTo('archive.html')">
        <div class="icon triangle-icon"></div>
        <div class="label">ARCHIVE</div>
      </div>

      <div class="card designers" onclick="goTo('designers.html')">
        <div class="icon">
          <div class="hex-grid">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="label">DESIGNERS</div>
      </div>

      <div class="card ai" onclick="openAITransition()">
        <div class="icon infinity-icon">∞</div>
        <div class="label">CAELINUS AI</div>
      </div>
    </div>
  </div>

  <div class="micro" id="micro">Consciousness / Fashion / Archive / Design</div>

  <div class="transition" id="transition">
    <div class="blackhole"></div>
    <div class="ai-title">CAELINUS AI</div>
  </div>

  <script>
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    const transition = document.getElementById("transition");
    const content = document.getElementById("content");
    const micro = document.getElementById("micro");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const stars = [];
    const STAR_COUNT = 260;
    let warpMode = false;
    let warpCenterX = window.innerWidth / 2;
    let warpCenterY = window.innerHeight / 2;

    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push(makeStar());
    }

    function makeStar() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2.2 + 0.25,
        speedX: (Math.random() - 0.5) * 0.08,
        speedY: Math.random() * 0.10 + 0.01,
        alpha: Math.random() * 0.65 + 0.16
      };
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const s of stars) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();

        if (!warpMode) {
          s.x += s.speedX;
          s.y += s.speedY;

          if (s.y > canvas.height + 5) {
            s.y = -5;
            s.x = Math.random() * canvas.width;
          }

          if (s.x < -5) s.x = canvas.width + 5;
          if (s.x > canvas.width + 5) s.x = -5;
        } else {
          const dx = warpCenterX - s.x;
          const dy = warpCenterY - s.y;
          s.x += dx * 0.035;
          s.y += dy * 0.035;
          s.r *= 0.992;

          if (Math.abs(dx) < 8 && Math.abs(dy) < 8) {
            s.x = Math.random() * canvas.width;
            s.y = Math.random() * canvas.height;
            s.r = Math.random() * 2.2 + 0.25;
          }
        }
      }

      requestAnimationFrame(drawStars);
    }

    drawStars();

    function goTo(page) {
      window.location.href = page;
    }

    function openAITransition() {
      if (warpMode) return;

      warpMode = true;
      warpCenterX = window.innerWidth / 2;
      warpCenterY = window.innerHeight / 2;

      content.classList.add("hide");
      micro.style.opacity = "0";
      transition.classList.add("active");

      setTimeout(() => {
        window.location.href = "ai.html";
      }, 1800);
    }
  </script>
</body>
</html>
